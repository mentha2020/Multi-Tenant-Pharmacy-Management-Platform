version: '3.8'

services:
  # Laravel Backend
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pharmacy-backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./backend/vendor:/var/www/vendor
    networks:
      - pharmacy-network
    depends_on:
      - db
      - redis
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=pharmacy_platform
      - DB_USERNAME=root
      - DB_PASSWORD=secret
      - REDIS_HOST=redis

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pharmacy-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - pharmacy-network
    depends_on:
      - app

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: pharmacy-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pharmacy_platform
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - pharmacy-network

  # Redis Cache
  redis:
    image: redis:alpine
    container_name: pharmacy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - pharmacy-network

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: pharmacy-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - pharmacy-network
    depends_on:
      - app

networks:
  pharmacy-network:
    driver: bridge

volumes:
  db-data:
